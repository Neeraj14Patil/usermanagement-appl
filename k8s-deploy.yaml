apiVersion: apps/v1
kind: Deployment
metadata:
  name: usermanagement-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: usermanagement
  template:
    metadata:
      labels:
        app: usermanagement
    spec:
      containers:
      - name: app
        image: neeraj14patil/usermanagement-application-image:latest
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: usermanagement-service
spec:
  type: NodePort
  selector:
    app: usermanagement
  ports:
    - port: 80
      targetPort: 8081
      nodePort: 30080
