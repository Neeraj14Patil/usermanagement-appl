version: '3.8'
services:
  mysql-db-1:
    image: mysql:8.0
    container_name: mysql-db-1
    environment:
      MYSQL_ROOT_PASSWORD: Nuvelabs123$
      MYSQL_DATABASE: userdb
    networks:
      - user-network
    volumes:
      - mysql-data:/var/lib/mysql

  usermanagement-application-1:
    build: .
    container_name: usermanagement-application-1
    ports:
      - "8082:8081"
    depends_on:
      - mysql-db-1
    networks:
      - user-network

networks:
  user-network:
    driver: bridge
volumes:
  mysql-data:
